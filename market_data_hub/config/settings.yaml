# ============================================================================
# market_data_hub — global settings
# ============================================================================

# Path of the DuckDB database (override with env MARKET_DATA_DB)
db_path: "market_data.duckdb"

# Report output directory (override with env MARKET_DATA_REPORT_DIR).
# Relative paths are resolved from the repo root. This is used for the daily
# market report, Ray Dalio report, and Telegram report attachments.
reports:
  dir: "reports"

# — historical backfill dates ---
backfill_start:
  yahoo: "2010-01-01"
  fred:  "2000-01-01"
  binance: "2018-01-01"
  factors: "1990-01-01"   # Fama-French (Ken French) history start

# — incremental download ---
incremental:
  tail_refresh_days: 3        # re-download the last N days (late corporate actions)
  fred_tail_days: 95          # FRED: re-download the last N days to cover revisions

# — parallelism ---
parallelism:
  yahoo_workers: 5
  binance_workers: 4
  yahoo_batch_sleep: 0.25     # pause between Yahoo batch groups
  fred_sleep: 0.15            # pause between FRED series (rate limit 120/min)
  imf_sleep: 0.5              # seconds between sequential IMF/BIS calls (WAF handled by per-call backoff)
  wb_workers: 5               # parallel World Bank fetches (macro_panel)

# — HTTP / retry ---
http:
  timeout: 30
  max_retries: 3
  retry_base_sleep: 1.0       # exponential backoff: 1, 4, 16s

# — FRED API ---
# Do NOT commit a key here. Provide it via the FRED_API_KEY environment variable
# (the loader overrides this field from the env). If both are empty, the public
# CSV endpoint (fredgraph.csv) is used without a key.
#   PowerShell:  setx FRED_API_KEY "your-key"
fred_api_key: ""

# — Binance crypto ---
crypto:
  symbols: ["BTCUSDT", "ETHUSDT", "SOLUSDT", "BNBUSDT", "ADAUSDT", "XRPUSDT"]
  timeframes: ["1h", "4h", "1d"]

# — Fama-French factors (Ken French Data Library) ---
factors:
  enabled: true
  datasets: ["FF5_daily", "MOM_daily"]   # keys from sources/factors.py CATALOG

# — cross-country macro panel ---
macro_panel:
  select_best_source: true   # true = fetch primary+fallback, keep wider country coverage
                              # (costs one extra API call per indicator that has a fallback)

# — live price injection (intraday) ---
live:
  enabled: true
  # only these asset classes receive the intraday update (liquid markets)
  asset_classes: ["EQUITY", "ALTERNATIVES", "FIXED_INCOME", "COMMODITIES", "REAL_ESTATE", "FX"]

# — Ray Dalio framework (configurable thresholds, NOT hard-coded — see spec v3) ---
dalio:
  z_window_years: 10          # z-score window (same frequency)
  z_min_obs: 5                # minimum observations for z-score (below → NULL)
  z_pos: 1.0                  # z threshold for POS signal
  z_neg: -1.0                 # z threshold for NEG signal
  # archetypal debt cycle thresholds (Dalio)
  credit_gap_bubble: 10.0     # credit-to-GDP gap > +10pp = bubble
  dsr_high: 20.0              # (absolute fallback if history is missing)
  dsr_peak_pct: 0.80          # DSR "stressed" if > 80th percentile of ITS history
                              # (Dalio: the peak vs itself matters, not the level)
  rate_near_zero: 1.0         # policy rate < 1% = pushing on a string
  credit_gap_late: 5.0        # gap 5-10pp = late/leveraging (toward the bubble)
  weak_growth: 1.5            # growth < 1.5% = weak (for pushing on a string)
  # LONG/sovereign debt cycle (Dalio's key thesis on the US):
  # the LEVEL of debt matters, not just the change.
  debt_high_level: 100.0      # public debt > 100% GDP = high
  debt_crisis_level: 130.0    # > 130% = very high (late cycle regardless)
  deficit_large: -4.5         # fiscal deficit < -4.5% GDP = large
  # debt/GDP TREND (Dalio's signal #1: debt vs income). Slope over
  # window [ref-3, ref+5] (includes the WEO projections, forward-looking).
  debt_trend_window_back: 3   # years back
  debt_trend_window_fwd: 5    # years forward (forecast)
  debt_trend_high: 1.5        # > +1.5 pp/year = markedly rising trajectory
  debt_trend_moderate: 0.7    # > +0.7 pp/year = rising
  # composite weights per pillar (the sum is renormalized over the available ones)
  pillar_weights:
    growth: 20
    debt_cycle: 20
    liquidity: 15
    external: 15
    sovereign: 10
    banking: 10
    governance: 5
    geopolitical: 5
    markets: 0                # staged market inputs (REER, 10Y yield): declared
                              # but UNWEIGHTED — visible to the Dalio layer without
                              # affecting the composite until explicitly wired in.

