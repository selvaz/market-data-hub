name: docs

on:
  push:
    branches: [main]
    paths:
      - "market_data_hub/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: pip install "mkdocs-material>=9.5"
      - name: Build docs
        run: mkdocs build --strict
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # First run on a repo where Pages isn't enabled yet: create the
          # Pages site (build_type: workflow) instead of failing. Uses the
          # workflow's pages:write permission.
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
