name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pytest ruff pip-audit

      - name: Lint (ruff — syntax/undefined-name errors)
        # Error-class rules only: catches real bugs without failing on style.
        run: ruff check --select E9,F63,F7,F82 .

      - name: Dependency audit (advisory, non-blocking)
        continue-on-error: true
        run: pip-audit

      - name: Validate config catalogs
        run: python validate_config.py

      - name: Byte-compile all modules
        run: python -m compileall -q market_data_hub *.py

      - name: Run tests
        run: pytest -q
